name: Deploy ao GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões necessárias para publicar no Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Garante um deploy por vez (não cancela um em andamento).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages (habilita se preciso)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Empacotar o site (raiz do repositório)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
